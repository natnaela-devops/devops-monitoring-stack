global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['host.docker.internal:9100']   # Node Exporter (add if needed)

  # Example for Kubernetes (when deployed in cluster)
  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
